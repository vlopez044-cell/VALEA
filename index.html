<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VALÉA Shop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg mi-navbar">
<div class="container">

<a class="navbar-brand text-white fw-bold" href="#inicio">VALÉA SHOP</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link text-white" href="#inicio">Inicio</a></li>
<li class="nav-item"><a class="nav-link text-white" href="#productos">Productos</a></li>
<li class="nav-item"><a class="nav-link text-white" href="#contacto">Contacto</a></li>
</ul>

<!-- CARRITO -->
<button class="btn btn-light" onclick="toggleCarrito()">
🛒 <span id="contadorCarrito">0</span>
</button>

</div>
</div>
</nav>

<!-- HERO -->
<section id="inicio" class="hero">
<div class="hero-text">
<h1>VALÉA SHOP</h1>
<p>Moda elegante, estilo único</p>
</div>
</section>

<!-- PRODUCTOS -->
<section id="productos" class="container mt-5">

<h2 class="text-center mb-4">Productos destacados</h2>

<div class="row">

<!-- PRODUCTO 1 -->
<div class="col-md-4">
<div class="card product">
<img src="https://images.unsplash.com/photo-1520975922284-9c1d1a2c1f8b?q=80&w=1200" class="card-img-top">

<div class="card-body">
<h5>Vestido Rosa</h5>
<p>$499 MXN</p>

<button class="btn btn-primary" onclick="agregarCarrito('Vestido Rosa',499)">
Agregar al carrito
</button>

<button class="btn btn-outline-danger" onclick="favorito(this)">❤️</button>
</div>
</div>
</div>

<!-- PRODUCTO 2 -->
<div class="col-md-4">
<div class="card product">
<img src="https://images.unsplash.com/photo-1520975682031-a7b0a9f7c9f1?q=80&w=1200" class="card-img-top">

<div class="card-body">
<h5>Blazer Elegante</h5>
<p>$899 MXN</p>

<button class="btn btn-primary" onclick="agregarCarrito('Blazer Elegante',899)">
Agregar al carrito
</button>

<button class="btn btn-outline-danger" onclick="favorito(this)">❤️</button>
</div>
</div>
</div>

<!-- PRODUCTO 3 -->
<div class="col-md-4">
<div class="card product">
<img src="https://images.unsplash.com/photo-1520975958223-8b0c3c7c9b6c?q=80&w=1200" class="card-img-top">

<div class="card-body">
<h5>Bolsa Luxury</h5>
<p>$699 MXN</p>

<button class="btn btn-primary" onclick="agregarCarrito('Bolsa Luxury',699)">
Agregar al carrito
</button>

<button class="btn btn-outline-danger" onclick="favorito(this)">❤️</button>
</div>
</div>
</div>

</div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="contacto">
<h3>Suscríbete</h3>
<input type="email" id="email" placeholder="Correo">
<button onclick="suscribir()">Enviar</button>
<p id="mensaje"></p>
</section>

<!-- CARRITO LATERAL -->
<div id="carrito" class="carrito">
<h4>Tu carrito</h4>

<div id="itemsCarrito"></div>

<h5>Total: $<span id="total">0</span></h5>

<button class="btn btn-success w-100">Pagar</button>

<button class="btn btn-danger w-100 mt-2" onclick="vaciarCarrito()">
Vaciar carrito
</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
